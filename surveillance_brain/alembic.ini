# Alembic configuration for the Surveillance DB System.
# The actual connection URL is injected from config.py via env.py, so this
# file doesn't need to be edited per-environment.

[alembic]
# Path to the migration environment.
script_location = alembic

# Template used for new migration files.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the file_template (UTC keeps everything deterministic).
timezone = UTC

# Truncate long multi-line messages in the revision file.
truncate_long_message = false

# Default encoding for the revision files.
output_encoding = utf-8

# SQL config — we run via env.py instead, so this is a placeholder.
sqlalchemy.url = postgresql+psycopg://surveillance:surveillance@localhost:5432/surveillance


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
